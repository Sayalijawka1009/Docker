apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp

        image: dockerhubsayaliiiii/myapp:latest

        ports:
        - containerPort: 80

Apply Deployment:

kubectl apply -f deployment.yaml
